<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Online Book Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Online Book Finder</h1>

    <div class="controls">
      <div class="search-group">
        <input type="text" id="searchInput" placeholder="Search by title (e.g. javascript)">
        <button onclick="searchByTitle()">Search</button>
      </div>

      <select id="categoryFilter" onchange="filterByCategory()">
        <option value="">All Categories</option>
        <option value="Programming">Programming</option>
        <option value="Fiction">Fiction</option>
        <option value="Science">Science</option>
        <option value="Self-Help">Self-Help</option>
      </select>

      <select id="sortSelect" onchange="sortBooks()">
        <option value="">Sort By...</option>
        <option value="price-asc">Price Low to High</option>
        <option value="price-desc">Price High to Low</option>
        <option value="rating-desc">Rating High to Low</option>
      </select>

      <button onclick="showTopRated()">Top Rated Books</button>
    </div>

    <div id="results" class="results-grid"></div>

    <div class="pagination">
      <button id="prevBtn" disabled onclick="changePage(-1)">Previous</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
